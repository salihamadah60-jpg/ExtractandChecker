kind = "web"
previewPath = "/"
title = "Link Checker"
version = "1.0.0"
id = "artifacts/link-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21956

[services.development]
run = "pnpm --filter @workspace/link-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/link-checker", "run", "build" ]
publicDir = "artifacts/link-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21956"
BASE_PATH = "/"
